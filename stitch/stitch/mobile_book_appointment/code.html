<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ClinicOS - Book Appointment</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400,500,600,700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a6aff",
                        "background-light": "#f5f6f8",
                        "background-dark": "#0f1623",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="mx-auto min-h-screen w-full max-w-[390px] bg-background-light dark:bg-background-dark pb-32">
<!-- Top App Bar -->
<header class="sticky top-0 z-50 flex items-center justify-between bg-white/80 dark:bg-background-dark/80 px-4 py-4 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<button class="flex h-10 w-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-lg font-bold">Book Appointment</h1>
<div class="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 p-1 rounded-full">
<button class="px-3 py-1 text-xs font-semibold rounded-full bg-white dark:bg-slate-700 shadow-sm">EN</button>
<button class="px-3 py-1 text-xs font-semibold text-slate-500">ES</button>
</div>
</header>
<main class="flex flex-col gap-6 p-4">
<!-- Patient Info Section -->
<section class="flex flex-col gap-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Patient Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person</span>
<input class="w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 py-4 pl-12 pr-4 text-base focus:border-primary focus:ring-primary" placeholder="Enter full name" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Mobile Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">call</span>
<input class="w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 py-4 pl-12 pr-4 text-base focus:border-primary focus:ring-primary" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Select Doctor</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">medical_services</span>
<select class="w-full appearance-none rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 py-4 pl-12 pr-10 text-base focus:border-primary focus:ring-primary">
<option>Dr. Sarah Mitchell (Cardiology)</option>
<option>Dr. James Wilson (Neurology)</option>
<option>Dr. Elena Rodriguez (General Medicine)</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">expand_more</span>
</div>
</div>
</section>
<!-- Calendar Section -->
<section class="flex flex-col gap-4 rounded-xl bg-white dark:bg-slate-900 p-4 shadow-sm border border-slate-100 dark:border-slate-800">
<div class="flex items-center justify-between pb-2">
<button class="text-primary hover:bg-primary/10 p-2 rounded-full">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<h3 class="font-bold">October 2023</h3>
<button class="text-primary hover:bg-primary/10 p-2 rounded-full">
<span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
<div class="grid grid-cols-7 gap-1">
<span class="text-center text-xs font-bold text-slate-400 py-2">S</span>
<span class="text-center text-xs font-bold text-slate-400 py-2">M</span>
<span class="text-center text-xs font-bold text-slate-400 py-2">T</span>
<span class="text-center text-xs font-bold text-slate-400 py-2">W</span>
<span class="text-center text-xs font-bold text-slate-400 py-2">T</span>
<span class="text-center text-xs font-bold text-slate-400 py-2">F</span>
<span class="text-center text-xs font-bold text-slate-400 py-2">S</span>
<!-- Calendar days -->
<button class="h-10 text-sm flex items-center justify-center rounded-lg text-slate-300">24</button>
<button class="h-10 text-sm flex items-center justify-center rounded-lg text-slate-300">25</button>
<button class="h-10 text-sm flex items-center justify-center rounded-lg text-slate-300">26</button>
<button class="h-10 text-sm flex items-center justify-center rounded-lg text-slate-300">27</button>
<button class="h-10 text-sm flex items-center justify-center rounded-lg text-slate-300">28</button>
<button class="h-10 text-sm flex items-center justify-center rounded-lg text-slate-300">29</button>
<button class="h-10 text-sm flex items-center justify-center rounded-lg text-slate-300">30</button>
<button class="h-10 text-sm flex items-center justify-center rounded-lg hover:bg-primary/10">1</button>
<button class="h-10 text-sm flex items-center justify-center rounded-lg hover:bg-primary/10">2</button>
<button class="h-10 text-sm flex items-center justify-center rounded-lg hover:bg-primary/10">3</button>
<button class="h-10 text-sm flex items-center justify-center rounded-lg hover:bg-primary/10">4</button>
<button class="h-10 text-sm flex items-center justify-center rounded-lg bg-primary text-white font-bold">5</button>
<button class="h-10 text-sm flex items-center justify-center rounded-lg hover:bg-primary/10">6</button>
<button class="h-10 text-sm flex items-center justify-center rounded-lg hover:bg-primary/10">7</button>
</div>
</section>
<!-- Time Slots -->
<section class="flex flex-col gap-3">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Available Time Slots</label>
<div class="grid grid-cols-3 gap-2">
<button class="rounded-xl border border-primary bg-primary/10 py-3 text-sm font-bold text-primary">09:00 AM</button>
<button class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 py-3 text-sm font-medium hover:border-primary">10:30 AM</button>
<button class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 py-3 text-sm font-medium hover:border-primary">01:00 PM</button>
<button class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 py-3 text-sm font-medium hover:border-primary">02:30 PM</button>
<button class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 py-3 text-sm font-medium hover:border-primary text-slate-400" disabled="">04:00 PM</button>
<button class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 py-3 text-sm font-medium hover:border-primary">05:30 PM</button>
</div>
</section>
<!-- Reason for Visit -->
<section class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Reason for Visit</label>
<textarea class="w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4 text-base focus:border-primary focus:ring-primary resize-none" placeholder="Briefly describe your symptoms or reason for the appointment" rows="3"></textarea>
</section>
</main>
<!-- Sticky Bottom CTA -->
<footer class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[390px] bg-white dark:bg-background-dark p-4 shadow-[0_-8px_30px_rgb(0,0,0,0.04)] border-t border-slate-100 dark:border-slate-800 z-50">
<button class="w-full rounded-xl bg-primary py-4 text-center text-lg font-bold text-white shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">
                Confirm Booking
            </button>
<p class="mt-3 text-center text-xs text-slate-400">By booking, you agree to our Terms of Service</p>
</footer>
</div>
</body></html>
