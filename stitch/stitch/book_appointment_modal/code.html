<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a6aff",
                        "background-light": "#f5f6f8",
                        "background-dark": "#0f1623",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>ClinicOS - Book Appointment</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="flex items-center justify-center p-4 sm:p-8">
<div class="bg-white dark:bg-slate-900 w-full max-w-[600px] rounded-xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Header Section -->
<header class="flex items-center justify-between border-b border-slate-100 dark:border-slate-800 px-6 py-4">
<div class="flex items-center gap-3">
<div class="size-8 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M24 4H42V17.3333V30.6667H24V44H6V30.6667V17.3333H24V4Z" fill="currentColor" fill-rule="evenodd"></path>
</svg>
</div>
<h2 class="text-xl font-bold tracking-tight">ClinicOS</h2>
</div>
<button class="flex items-center justify-center rounded-full size-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<div class="px-6 py-4">
<h1 class="text-2xl font-bold mb-1">Book Appointment</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Please fill in the details below to schedule your consultation.</p>
</div>
<!-- Conflict Warning Banner -->
<div class="mx-6 mb-4 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg flex items-start gap-3">
<span class="material-symbols-outlined text-red-600 dark:text-red-400">warning</span>
<div class="text-sm">
<p class="font-semibold text-red-800 dark:text-red-300">Slot Unavailable</p>
<p class="text-red-700 dark:text-red-400">The 10:30 AM slot has just been booked. Please select another time.</p>
</div>
</div>
<form class="px-6 pb-8 space-y-5">
<!-- Patient Info Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Patient Name</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-primary focus:border-primary px-4 py-2.5" placeholder="Enter full name" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Mobile Number</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-primary focus:border-primary px-4 py-2.5" placeholder="+91 XXXXX XXXXX" type="tel"/>
</div>
</div>
<!-- Doctor & Date Selection -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Doctor Selection</label>
<select class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-primary focus:border-primary px-4 py-2.5 appearance-none">
<option value="">Select a Doctor</option>
<option value="dr-sharma">Dr. Arvind Sharma (Cardiologist)</option>
<option value="dr-patil">Dr. Sunita Patil (Pediatrician)</option>
<option value="dr-desai">Dr. Rahul Desai (General Physician)</option>
</select>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Preferred Date</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-primary focus:border-primary px-4 py-2.5" type="date"/>
</div>
</div>
<!-- Time Slot Grid -->
<div class="flex flex-col gap-3">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Available Time Slots</label>
<div class="grid grid-cols-3 sm:grid-cols-4 gap-2">
<button class="py-2 text-sm font-medium rounded-lg border border-emerald-200 bg-emerald-50 text-emerald-700 dark:bg-emerald-900/30 dark:border-emerald-800 dark:text-emerald-400 hover:bg-emerald-100 transition-colors" type="button">09:00 AM</button>
<button class="py-2 text-sm font-medium rounded-lg border border-emerald-200 bg-emerald-50 text-emerald-700 dark:bg-emerald-900/30 dark:border-emerald-800 dark:text-emerald-400 hover:bg-emerald-100 transition-colors" type="button">09:30 AM</button>
<button class="py-2 text-sm font-medium rounded-lg border border-slate-200 bg-slate-100 text-slate-400 cursor-not-allowed dark:bg-slate-800 dark:border-slate-700 dark:text-slate-500" type="button">10:00 AM</button>
<button class="py-2 text-sm font-medium rounded-lg border border-primary bg-primary text-white shadow-md" type="button">10:30 AM</button>
<button class="py-2 text-sm font-medium rounded-lg border border-emerald-200 bg-emerald-50 text-emerald-700 dark:bg-emerald-900/30 dark:border-emerald-800 dark:text-emerald-400 hover:bg-emerald-100 transition-colors" type="button">11:00 AM</button>
<button class="py-2 text-sm font-medium rounded-lg border border-slate-200 bg-slate-100 text-slate-400 cursor-not-allowed dark:bg-slate-800 dark:border-slate-700 dark:text-slate-500" type="button">11:30 AM</button>
<button class="py-2 text-sm font-medium rounded-lg border border-emerald-200 bg-emerald-50 text-emerald-700 dark:bg-emerald-900/30 dark:border-emerald-800 dark:text-emerald-400 hover:bg-emerald-100 transition-colors" type="button">12:00 PM</button>
<button class="py-2 text-sm font-medium rounded-lg border border-emerald-200 bg-emerald-50 text-emerald-700 dark:bg-emerald-900/30 dark:border-emerald-800 dark:text-emerald-400 hover:bg-emerald-100 transition-colors" type="button">12:30 PM</button>
</div>
</div>
<!-- Reason for Visit -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Reason for Visit</label>
<textarea class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-primary focus:border-primary px-4 py-2.5 resize-none" placeholder="Briefly describe your symptoms or reason for the visit" rows="3"></textarea>
</div>
<!-- Language Toggle -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Preferred Communication Language</label>
<div class="flex p-1 bg-slate-100 dark:bg-slate-800 rounded-lg w-fit">
<button class="px-4 py-1.5 text-sm font-medium rounded-md bg-white dark:bg-slate-700 shadow-sm text-primary" type="button">English</button>
<button class="px-4 py-1.5 text-sm font-medium text-slate-500 hover:text-slate-700 dark:hover:text-slate-300" type="button">Hindi</button>
<button class="px-4 py-1.5 text-sm font-medium text-slate-500 hover:text-slate-700 dark:hover:text-slate-300" type="button">Marathi</button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined">check_circle</span>
                        Confirm Booking
                    </button>
<p class="text-center text-xs text-slate-400 mt-4">By booking, you agree to our Terms of Service and Privacy Policy.</p>
</div>
</form>
</div>
</div>
</body></html>
